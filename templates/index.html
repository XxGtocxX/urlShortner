<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>URL Shortener</h1>

    <input
        type="text"
        id="urlInput"
        placeholder="Enter URL"
    >

    <br>

    <button onclick="shortenURL()">
        Shorten
    </button>

    <div id="result"></div>

    <script>

        async function shortenURL() {

            const longUrl =
                document.getElementById('urlInput').value;

            const response = await fetch('/shorten', {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    long_url: longUrl
                })
            });

            const data = await response.json();

            document.getElementById('result').innerHTML =
                `<a href="${data.short_url}" target="_blank">
                    ${data.short_url}
                </a>`;
        }

    </script>

</body>
</html>
