version: '3.9'

services:

  app:
    build: .
    ports:
      - "5000:5000"

    depends_on:
      - postgres
      - redis

    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres/url_shortener

  postgres:
    image: postgres:15

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"